# Sensitive Guard 自定义规则配置
#
# 说明：
# 1. 每行一个字段名，支持大小写、下划线、中划线
# 2. 系统会自动为这些字段生成脱敏规则
# 3. 修改后重新加载：source ~/.zshrc
#
# 格式示例：
# MY_API_KEY
# CUSTOM_TOKEN
# DATABASE_PASSWORD

# 默认已支持的字段（无需添加）：
# - API_KEY, APIKEY, api_key
# - TOKEN, ACCESS_TOKEN, REFRESH_TOKEN
# - APP_ID, APPID, app_id
# - APP_SECRET, APPSECRET, app_secret
# - WECHAT_APPID, WECHAT_SECRET
# - password, secret, secretKey

# 在下方添加你的自定义字段：
